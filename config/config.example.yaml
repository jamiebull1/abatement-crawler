# Abatement Crawler Configuration Example

scope:
  industry: steel
  process: electric arc furnace
  asset_type: furnace
  company: null
  geography:
    - UK
    - EU
  sectors:
    - industry
    - manufacturing
  abatement_types:  # subset as needed — all 13 categories listed for reference
    - demand_reduction
    - energy_efficiency
    - electrification
    - low_carbon_supply
    - fuel_switching
    - flexibility_storage
    - process_emissions
    - fugitive_fossil
    - fugitive_fgases
    - mining_extractives
    - materials_circular
    - carbon_capture
    - cdr
  year_range:
    - 2015
    - 2025
  languages:
    - en

search_api: duckduckgo
search_api_key: ""  # Only needed for Google CSE, Bing, or SerpAPI; set via SEARCH_API_KEY environment variable
max_search_queries: 200
results_per_query: 10

max_depth: 4
relevance_threshold: 0.3
reflection_interval: 50
max_total_documents: 2000

llm_model: claude-sonnet-4-20250514
llm_api_key: ""  # Set via ANTHROPIC_API_KEY environment variable
extraction_temperature: 0
max_retries: 2

base_currency: GBP
base_year: 2023
min_quality_for_export: 0.3

db_path: ./abatement_records.db
output_dir: ./output/

requests_per_second: 2.0
pdf_timeout_seconds: 30
respect_robots_txt: true
captcha_queue_enabled: true   # Queue captcha-blocked URLs for human review via CLI / web UI
request_jitter: 0.5           # Random jitter added to rate delays (fraction of base delay; 0 = no jitter)

# Pipeline mode: 3-layer sector decomposition → archetype mapping → targeted crawl
# Used when running: abatement-crawler crawl --mode pipeline [--sector "..."]
pipeline:
  sector: null                     # Sector to decompose; overrides scope.industry when set
  include_analogue_sectors: true   # Expand queries using analogue sectors (e.g. refuse trucks for fire fleet)
  max_queries_per_archetype: null  # Cap queries per archetype (null = unlimited)
