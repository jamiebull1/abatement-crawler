<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Abatement Crawler{% endblock %}</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
  <style>
    body { padding-top: 62px; }
    .navbar-brand { font-weight: 700; letter-spacing: .02em; }
    .quality-badge { font-size: .75rem; }
    pre code { font-size: .85rem; }
    .key-set { color: #198754; font-weight: 600; }
    .key-unset { color: #dc3545; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container-fluid container-xl">
      <a class="navbar-brand" href="{{ url_for('index') }}">🌱 Abatement Crawler</a>
      <button class="navbar-toggler" type="button"
              data-bs-toggle="collapse" data-bs-target="#mainNav"
              aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link {% if request.path == '/' %}active{% endif %}"
               href="{{ url_for('index') }}">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.path.startswith('/config') %}active{% endif %}"
               href="{{ url_for('config_view') }}">Configuration</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.path.startswith('/crawl') %}active{% endif %}"
               href="{{ url_for('crawl_view') }}">Crawl</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.path.startswith('/results') %}active{% endif %}"
               href="{{ url_for('results') }}">Results</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container-xl my-4">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          crossorigin="anonymous"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
